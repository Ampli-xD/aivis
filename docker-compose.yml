services:
  postgres:
    image: postgres:15-alpine
    container_name: aivis-postgres
    env_file:
      - .env
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed for internal security
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-aivis}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dopest-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aivis-backend
    env_file:
      - .env
      - ./backend/.env
    # No ports exposed for internal security
    # Reachable via frontend proxy at http://backend:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dopest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aivis-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dopest-network

networks:
  dopest-network:
    driver: bridge

volumes:
  postgres_data:
